server:
  port: 8083

spring:
  config:
    activate:
      on-profile: prod

  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: notification-group-prod
      auto-offset-reset: latest

  mail:
    host: smtp.gmail.com
    port: 587
    username: prod-email@gmail.com
    password: prod-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    root: INFO